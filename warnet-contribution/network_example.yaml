# Fork Partition Network — example for fork_partition.py
#
# 8 nodes split into two pre-partitioned islands:
#   Fork A (tank-0001 – tank-0004): bitcoin 27.0  ← new consensus rules
#   Fork B (tank-0005 – tank-0008): bitcoin 26.0  ← old consensus rules
#
# addnode entries are intra-partition only. The scenario auto-detects
# which partition each node belongs to via its subversion string.
#
# To model a different version pair, change the image tags and pass:
#   warnet run fork_partition.py --fork-a-version "28." --fork-b-version "27."

caddy:
  enabled: true

nodes:

  # --- Fork A (bitcoin 27.0) ---

  - name: tank-0001
    image:
      tag: "27.0"
    config: uacomment=fork-a
    addnode:
      - tank-0002
      - tank-0003

  - name: tank-0002
    image:
      tag: "27.0"
    config: uacomment=fork-a
    addnode:
      - tank-0001
      - tank-0004

  - name: tank-0003
    image:
      tag: "27.0"
    config: uacomment=fork-a
    addnode:
      - tank-0001
      - tank-0004

  - name: tank-0004
    image:
      tag: "27.0"
    config: uacomment=fork-a
    addnode:
      - tank-0002
      - tank-0003

  # --- Fork B (bitcoin 26.0) ---

  - name: tank-0005
    image:
      tag: "26.0"
    config: uacomment=fork-b
    addnode:
      - tank-0006
      - tank-0007

  - name: tank-0006
    image:
      tag: "26.0"
    config: uacomment=fork-b
    addnode:
      - tank-0005
      - tank-0008

  - name: tank-0007
    image:
      tag: "26.0"
    config: uacomment=fork-b
    addnode:
      - tank-0005
      - tank-0008

  - name: tank-0008
    image:
      tag: "26.0"
    config: uacomment=fork-b
    addnode:
      - tank-0006
      - tank-0007
